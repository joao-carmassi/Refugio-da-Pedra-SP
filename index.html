<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="./assets/styles/reset.css">

<body>

    <main>

                    </svg>
                    <span class="text">Reservar</span>

        </section>
    </main>

    <footer></footer>

    <script>
        function clickMenu() {
            if (menu.style.display == 'block') {
                menu.style.display = 'none'
            }
            else {
                menu.style.display = 'block'
            }
        }
    </script>
